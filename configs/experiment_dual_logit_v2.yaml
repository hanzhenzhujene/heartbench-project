experiment:
  name: "heartbench_v2_dual_logit"

benchmarks:
  heartbench_v2:
    role: primary
    benchmark_file: "benchmark/heartbench_v2_120.jsonl"
    description: "120-item high-precision HeartBench-v2 benchmark"
  heartbench_v2_dev:
    role: diagnostic
    benchmark_file: "benchmark/heartbench_v2_dev.jsonl"
    description: "30-item dev slice for fast prompt checks"

default_benchmark: "heartbench_v2"

main:
  conditions: ["C0", "C1", "C2", "C3", "C4"]
  models: ["Qwen/Qwen2.5-0.5B-Instruct", "Qwen/Qwen2.5-1.5B-Instruct"]

execution_groups:
  primary_0p5b_full:
    benchmark: "heartbench_v2"
    models: ["Qwen/Qwen2.5-0.5B-Instruct"]
    conditions: ["C0", "C1", "C2", "C3", "C4"]
    purpose: "Full primary matrix for the smaller model"
  primary_1p5b_confirmatory:
    benchmark: "heartbench_v2"
    models: ["Qwen/Qwen2.5-1.5B-Instruct"]
    conditions: ["C0", "C2", "C4"]
    purpose: "Focused confirmatory primary contrasts for the larger model"
  diagnostic_1p5b_dev:
    benchmark: "heartbench_v2_dev"
    models: ["Qwen/Qwen2.5-1.5B-Instruct"]
    conditions: ["C0", "C2", "C4"]
    purpose: "Smaller diagnostic slice for the larger model"
