prompt_templates:
  j1_baseline: "research/prompts/staged_j1_baseline.txt"
  j1_with_pre_frame: "research/prompts/staged_j1_with_pre_frame.txt"
  explanation_followup: "research/prompts/staged_explanation_followup.txt"
  explanation_with_post_frame: "research/prompts/staged_explanation_with_post_frame.txt"
  j2_followup: "research/prompts/staged_j2_followup.txt"
  repair_prompt: "research/prompts/staged_repair_prompt.txt"

frame_variants:
  secular:
    - id: "secular_v1"
      file: "research/prompts/staged_frame_secular_v1.txt"
    - id: "secular_v2"
      file: "research/prompts/staged_frame_secular_v2.txt"
    - id: "secular_v3"
      file: "research/prompts/staged_frame_secular_v3.txt"
  christian:
    - id: "christian_v1"
      file: "research/prompts/staged_frame_christian_v1.txt"
    - id: "christian_v2"
      file: "research/prompts/staged_frame_christian_v2.txt"
    - id: "christian_v3"
      file: "research/prompts/staged_frame_christian_v3.txt"
  none:
    - id: "default"
      text: ""

conditions:
  - id: "baseline"
    name: "Baseline Staged"
    frame_family: "none"
    frame_placement: "none"
    run_explanation: true
    run_j2: true
  - id: "secular_pre"
    name: "Secular Pre"
    frame_family: "secular"
    frame_placement: "pre"
    run_explanation: true
    run_j2: true
  - id: "christian_pre"
    name: "Christian Pre"
    frame_family: "christian"
    frame_placement: "pre"
    run_explanation: true
    run_j2: true
  - id: "secular_post"
    name: "Secular Post"
    frame_family: "secular"
    frame_placement: "post"
    run_explanation: true
    run_j2: true
  - id: "christian_post"
    name: "Christian Post"
    frame_family: "christian"
    frame_placement: "post"
    run_explanation: true
    run_j2: true
  - id: "judgment_only"
    name: "Judgment Only"
    frame_family: "none"
    frame_placement: "none"
    run_explanation: false
    run_j2: false
